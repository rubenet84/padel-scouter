{# _player_header.html — Header, avatar, datos básicos del jugador #}
{# Dependencias: player (object) — TODO: migrate to Jinja template vars #}

<!-- Player Profile Card -->
<div class="gradient-border rounded-2xl card-hover" style="background:#12121A;overflow:visible;">
    <div class="h-0.5 w-full" style="background:linear-gradient(90deg,transparent,#FF6B00,transparent);"></div>
    <div class="p-6">
        <!-- Avatar (click to upload) -->
        <div class="flex justify-center mb-3">
            <div class="pulse-ring cursor-pointer group" onclick="document.getElementById('avatar-input').click();" title="Subir o cambiar la foto de perfil del jugador">
                <div id="avatar-container" class="w-24 h-24 rounded-full ki-charge flex items-center justify-center text-4xl overflow-hidden relative" style="border:2px solid rgba(255,107,0,0.5);background:#1A1A25;">
                    <img id="avatar-img" src="" class="hidden w-full h-full object-cover" alt="Avatar" style="display:none;">
                    <img id="avatar-placeholder" src="/static/images/padel.gif" class="w-full h-full object-cover" alt="">
                    <div id="avatar-spinner" class="absolute inset-0 rounded-full bg-black/80 hidden flex items-center justify-center" style="z-index:5;">
                        <div class="w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                    </div>
                </div>
                <div class="absolute inset-0 rounded-full bg-black/0 group-hover:bg-black/40 transition-colors flex items-center justify-center">
                    <span class="text-white text-xs font-bold opacity-0 group-hover:opacity-100 transition-opacity">✏️</span>
                </div>
            </div>
        </div>
        <input id="avatar-input" type="file" accept="image/jpeg,image/png,image/gif,image/webp" class="hidden" onchange="uploadAvatar(event)">

        <!-- Name -->
        <div class="text-center mb-2">
            <h1 id="player-name" class="text-xl font-bold text-white"></h1>
        </div>

        <!-- Category badge (debajo del nombre) -->
        <div class="text-center mb-5">
            <span id="badge-category" class="inline-block px-4 py-0.5 rounded-full text-black font-black text-xs tracking-wider" style="background:linear-gradient(90deg,#FF6B00,#FFD700);">—</span>
            <div class="mt-1.5">
                <span id="badge-suggested" class="text-[10px] font-bold tracking-wider hidden" style="color:#FFD700;"></span>
            </div>
        </div>

        <!-- Power Level -->
        <div class="scouter-scan rounded-xl p-4 mb-5" style="background:rgba(10,10,15,0.8);border:1px solid rgba(0,255,135,0.15);">
            <div class="flex items-center justify-between mb-1">
                <span class="text-xs font-bold tracking-widest uppercase" style="color:rgba(0,255,135,0.6);">Power Level</span>
                <div class="flex items-center gap-1">
                    <div class="w-1.5 h-1.5 rounded-full animate-pulse" style="background:#00FF87;"></div>
                    <span class="text-xs" style="color:rgba(0,255,135,0.4);">LIVE</span>
                </div>
            </div>
            <div id="power-display" class="text-4xl font-black power-flicker tracking-tight" style="color:#00FF87;">—</div>
            <div class="mt-3 h-1.5 rounded-full overflow-hidden" style="background:#1A1A25;">
                <div id="power-bar" class="h-full rounded-full fill-animate" style="background:linear-gradient(90deg,#00FF87,#3B82F6);width:0%;"></div>
            </div>
            <div class="flex justify-between mt-1">
                <span class="text-xs" style="color:#334155;">0</span>
                <span class="text-xs" style="color:#334155;">9,999</span>
            </div>
        </div>

        <!-- Quick stats -->
        <div class="grid grid-cols-3 gap-2">
            <div class="text-center p-2.5 rounded-lg" style="background:rgba(10,10,15,0.5);border:1px solid rgba(42,42,58,0.5);">
                <p id="stat-torneos" class="text-lg font-bold text-white">—</p>
                <p class="text-xs uppercase tracking-wider" style="color:#475569;">Torneos</p>
            </div>
            <div class="text-center p-2.5 rounded-lg" style="background:rgba(10,10,15,0.5);border:1px solid rgba(42,42,58,0.5);">
                <p id="stat-winrate" class="text-lg font-bold" style="color:#00FF87;">—</p>
                <p class="text-xs uppercase tracking-wider" style="color:#475569;">Win Rate</p>
            </div>
            <div class="text-center p-2.5 rounded-lg" style="background:rgba(10,10,15,0.5);border:1px solid rgba(42,42,58,0.5);">
                <p id="stat-fep" class="text-lg font-bold" style="color:#FF6B00;">—</p>
                <p class="text-xs uppercase tracking-wider" style="color:#475569;">Pts FEP</p>
            </div>
        </div>
    </div>
</div>

<!-- Golpe definitivo card -->
<div id="golpe-card" class="gradient-border rounded-2xl card-hover hidden" style="background:#12121A;overflow:hidden;">
    <div class="h-0.5 w-full" style="background:linear-gradient(90deg,transparent,#FFD700,transparent);"></div>
    <div class="p-6">
        <div class="flex items-center gap-2 mb-4">
            <span class="text-xs font-bold tracking-widest uppercase" style="color:rgba(255,215,0,0.6);">⚡ Golpe Definitivo</span>
        </div>
        <div class="flex items-start justify-between gap-3 mb-3">
            <div class="flex-1">
                <h3 id="golpe-nombre" class="text-xl font-bold text-white" style="font-family:'Rajdhani','Inter',sans-serif;letter-spacing:0.02em;">—</h3>
                <div id="golpe-stat-sub" class="text-xs font-semibold mt-1" style="color:rgba(255,107,0,0.65);letter-spacing:0.05em;">—</div>
            </div>
            <span id="nivel-amenaza-badge" class="text-lg font-black sss-glow" style="font-family:'Rajdhani','Inter',sans-serif;color:#FFD700;white-space:nowrap;text-align:right;line-height:1.15;">—</span>
        </div>
        <p id="golpe-descripcion" class="hidden text-sm leading-relaxed mb-4 italic" style="color:rgba(203,213,225,0.82);line-height:1.65;"></p>
        <div class="flex justify-between items-center mb-1.5">
            <span class="text-xs" style="color:rgba(148,163,184,0.55);letter-spacing:0.05em;">Nivel de amenaza</span>
            <span id="nivel-amenaza-text" class="text-sm font-bold" style="font-family:'Rajdhani','Inter',sans-serif;color:#FFD700;">—</span>
        </div>
        <div class="h-2 rounded-full overflow-hidden mb-4" style="background:rgba(10,10,15,0.8);">
            <div id="amenaza-bar" class="h-full rounded-full" style="width:0%;background:linear-gradient(90deg,#FF6B00,#FFD700);position:relative;"></div>
        </div>
        <div class="db-separator"></div>
        <div id="dragon-balls-container" class="db-balls-row"></div>
        <div id="shenron-section" class="hidden">
            <div id="shenron-container" class="shenron-wrapper">
                <div id="shenron-svg" class="shenron-svg"></div>
            </div>
            <div style="position:relative;display:flex;justify-content:center;">
                <video id="goku-video" src="/static/video/Goku-Ultra-Instinct.mp4" class="shenron-gif" autoplay muted loop playsinline data-pin-nopin="true" disablepictureinpicture controlslist="nodownload nofullscreen noremoteplayback"></video>
                <button id="unmute-btn" style="position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.6);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;z-index:5;" title="Activar sonido">🔇</button>
            </div>
        </div>
        <div id="mrsatan-section" class="hidden" style="padding-top:14px;padding-bottom:4px;">
            <div style="position:relative;display:flex;justify-content:center;">
                <img src="/static/images/MrSatan.JPG?v=2" class="mrsatan-img" alt="Mr. Satan">
            </div>
        </div>
        <div id="gohan-section" class="hidden" style="padding-top:14px;padding-bottom:4px;">
            <div style="position:relative;display:flex;justify-content:center;">
                <img src="/static/images/Gohan-SuperSaiyajin2.JPG?v=2" class="gohan-img" alt="Gohan SSJ2">
            </div>
        </div>
        <div id="goku4-section" class="hidden" style="padding-top:14px;padding-bottom:4px;">
            <div style="position:relative;display:flex;justify-content:center;">
                <img src="/static/images/Goku-SuperSayajin4.JPG?v=2" class="goku4-img" alt="Goku SSJ4">
            </div>
        </div>
    </div>
</div>

<!-- Análisis IA Card -->
<div id="ai-desc-card" class="rounded-2xl card-hover hidden" style="background:#12121A;border:1px solid rgba(59,130,246,0.15);overflow:hidden;">
    <div class="h-0.5 w-full" style="background:linear-gradient(90deg,transparent,#3B82F6,transparent);"></div>
    <div class="p-5">
        <div class="flex items-center gap-2 mb-3">
            <span class="text-xs font-bold tracking-widest uppercase" style="color:rgba(59,130,246,0.6);">🤖 Análisis IA</span>
        </div>
        <p id="ai-description" class="text-sm leading-relaxed italic" style="color:#94a3b8;"></p>
    </div>
</div>
