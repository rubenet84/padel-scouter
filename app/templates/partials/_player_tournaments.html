{# _player_tournaments.html — Tournament fields inside match modal #}
{# Dependencias: tournaments (array) #}

<!-- Campos torneo (ocultos por defecto) -->
<div id="torneo-fields" class="hidden space-y-3 p-3 rounded-xl" style="background:rgba(168,85,247,0.05);border:1px solid rgba(168,85,247,0.1);">
    <div id="torneo-select-section">
        <label class="text-xs text-gray-500 mb-1 block">Seleccionar torneo</label>
        <div class="flex gap-1">
            <select id="m-torneo-select"
                    class="flex-1 rounded-lg px-3 py-2.5 text-sm text-white min-w-0"
                    style="background:#0A0A0F;border:1px solid rgba(168,85,247,0.2);"
                    onchange="onTournamentSelect()">
                <option value="">— Seleccionar —</option>
            </select>
            <button type="button" onclick="showNewTournamentForm()"
                    class="px-1 py-0.5 rounded text-[11px] font-bold whitespace-nowrap transition-all"
                    style="background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.3);color:#a855f7;">
                + Nuevo
            </button>
        </div>
    </div>
    <!-- Tournament admin row (edit/delete) -->
    <div id="tournament-admin-row" class="hidden flex items-center justify-between px-1 py-1.5 rounded-lg" style="background:rgba(168,85,247,0.06);">
        <span id="tournament-admin-name" class="text-xs text-gray-400 truncate mr-2"></span>
        <div class="flex gap-1.5">
            <button type="button" onclick="showTournamentEditForm()"
                    class="px-2 py-1 rounded text-[11px] font-bold transition-all"
                    style="background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.25);color:#60a5fa;"
                    title="Editar torneo">✏️ Editar</button>
            <button type="button" onclick="deleteSelectedTournament()"
                    class="px-2 py-1 rounded text-[11px] font-bold transition-all"
                    style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#ef4444;"
                    title="Eliminar torneo">🗑️ Eliminar</button>
        </div>
    </div>
    <!-- Inline edit tournament form (hidden) -->
    <div id="edit-tournament-form" class="hidden space-y-2 p-3 rounded-xl" style="background:rgba(10,10,15,0.5);border:1px solid rgba(59,130,246,0.2);">
        <input id="e-tournament-name" type="text" placeholder="Nombre del torneo" maxlength="200"
            class="w-full rounded-lg px-3 py-2 text-sm text-white"
            style="background:#0A0A0F;border:1px solid rgba(59,130,246,0.2);">
        <input id="e-tournament-date" type="date"
            class="w-full rounded-lg px-3 py-2 text-sm text-white"
            style="background:#0A0A0F;border:1px solid rgba(59,130,246,0.2);">
        <input id="e-tournament-fep" type="number" placeholder="Puntos FEP" min="0" max="99999"
            class="w-full rounded-lg px-3 py-2 text-sm text-white"
            style="background:#0A0A0F;border:1px solid rgba(59,130,246,0.2);">
        <div id="edit-tournament-error" class="hidden text-xs p-2 rounded-lg" style="color:#ef4444;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);"></div>
        <div class="flex gap-2">
            <button type="button" onclick="saveTournamentEdit()"
                    class="flex-1 py-2 rounded-lg text-xs font-bold transition-all"
                    style="background:rgba(0,255,135,0.15);border:1px solid rgba(0,255,135,0.3);color:#00FF87;">
                Guardar cambios
            </button>
            <button type="button" onclick="cancelTournamentEdit()"
                    class="py-2 rounded-lg text-xs font-bold transition-all"
                    style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#ef4444;">
                Cancelar
            </button>
        </div>
    </div>
    <!-- Inline new tournament form (hidden) -->
    <div id="new-tournament-form" class="hidden space-y-2 p-3 rounded-xl" style="background:rgba(10,10,15,0.5);border:1px solid rgba(168,85,247,0.15);">
        <input id="m-tournament-name" type="text" placeholder="Nombre del torneo" maxlength="200"
            class="w-full rounded-lg px-3 py-2 text-sm text-white"
            style="background:#0A0A0F;border:1px solid rgba(168,85,247,0.2);">
        <input id="m-tournament-date" type="date"
            class="w-full rounded-lg px-3 py-2 text-sm text-white"
            style="background:#0A0A0F;border:1px solid rgba(168,85,247,0.2);">
        <input id="m-tournament-fep" type="number" placeholder="Puntos FEP (opcional)" min="0" max="99999"
            class="w-full rounded-lg px-3 py-2 text-sm text-white"
            style="background:#0A0A0F;border:1px solid rgba(168,85,247,0.2);">
        <div id="new-tournament-error" class="hidden text-xs p-2 rounded-lg" style="color:#ef4444;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);"></div>
        <div class="flex gap-2">
            <button type="button" onclick="createTournamentInline()"
                    class="flex-1 py-2 rounded-lg text-xs font-bold transition-all"
                    style="background:rgba(0,255,135,0.15);border:1px solid rgba(0,255,135,0.3);color:#00FF87;">
                Crear torneo
            </button>
            <button type="button" onclick="cancelNewTournament()"
                    class="py-2 rounded-lg text-xs font-bold transition-all"
                    style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#ef4444;">
                Cancelar
            </button>
        </div>
    </div>
    <!-- Nombre del torneo (visible solo al editar) -->
    <div id="torneo-edit-name" class="hidden">
        <label class="text-xs text-gray-500 mb-1 block">Torneo</label>
        <select id="torneo-edit-name-select" disabled
            class="w-full rounded-lg px-3 py-2.5 text-sm text-white opacity-70"
            style="background:#0A0A0F;border:1px solid rgba(168,85,247,0.2);">
            <option></option>
        </select>
    </div>
    <div class="grid grid-cols-2 gap-3">
        <div>
            <label class="text-xs text-gray-500 mb-1 block">Ronda</label>
            <select id="m-ronda"
                    class="w-full rounded-lg px-3 py-2.5 text-sm text-white"
                    style="background:#0A0A0F;border:1px solid rgba(168,85,247,0.2);"
                    onchange="document.getElementById('match-error')?.classList.add('hidden')">
                <option value="Fase de grupos">Fase de grupos</option>
                <option value="32avos">32avos</option>
                <option value="16avos">16avos</option>
                <option value="Octavos">Octavos</option>
                <option value="Cuartos">Cuartos</option>
                <option value="Semifinal">Semifinal</option>
                <option value="Final">Final</option>
            </select>
        </div>
        <div>
            <label class="text-xs text-gray-500 mb-1 block">Pareja rival</label>
            <input id="m-pareja-rival" type="text" placeholder="ej: García / López"
                class="w-full rounded-lg px-3 py-2.5 text-sm text-white"
                style="background:#0A0A0F;border:1px solid rgba(168,85,247,0.2);">
        </div>
    </div>
</div>
