<section class="landing-section landing-scouter-panel mb-16">
    <div class="landing-scan-line"></div>

    <div class="flex flex-col lg:flex-row items-center gap-10 relative z-10">
        <!-- Left: Scouter display -->
        <div class="flex-1 text-center lg:text-left">
            <div class="inline-block">
                <span class="landing-power-label">Poder de Combate</span>
                <div class="landing-power-level">{{ landing_data.hero.power_level }}</div>
            </div>

            <h1 class="text-4xl lg:text-5xl font-black text-white mt-6 mb-4 leading-tight">
                {{ landing_data.hero.title }}
            </h1>
            <p class="text-lg lg:text-xl text-gray-400 mb-8 max-w-xl">
                {{ landing_data.hero.subtitle }}
            </p>

            <div class="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start">
                <a href="{{ landing_data.hero.cta_url }}"
                   class="landing-cta-button">
                    {{ landing_data.hero.cta_text }}
                </a>
                <a href="{{ landing_data.hero.secondary_cta_url }}"
                   class="px-6 py-3 rounded-xl text-sm font-bold transition-all text-center"
                   style="border: 1px solid rgba(255,255,255,0.15); color: #94A3B8;">
                    {{ landing_data.hero.secondary_cta_text }}
                </a>
            </div>
        </div>

        <!-- Right: Decorative element -->
        <div class="flex-shrink-0 hidden lg:flex items-center justify-center w-48 h-48 rounded-full"
             style="background: radial-gradient(circle, rgba(0,255,135,0.08) 0%, transparent 70%); border: 1px solid rgba(0,255,135,0.1);">
            <span class="text-7xl">🔮</span>
        </div>
    </div>
</section>
