<section class="landing-section mb-16">
    <h2 class="text-3xl font-black text-white text-center mb-3">
        ¿Por qué <span style="color: #FF6B00;">Padel Scouter</span>?
    </h2>
    <p class="text-center text-gray-400 mb-10 max-w-xl mx-auto">
        Todo lo que necesitás para analizar, comparar y mejorar tu juego
    </p>

    <div class="landing-feature-grid">
        {% for feature in landing_data.features %}
        <div class="landing-feature-card">
            <div class="landing-feature-icon">{{ feature.icon }}</div>
            <h3 class="landing-feature-title">{{ feature.title }}</h3>
            <p class="landing-feature-desc">{{ feature.description }}</p>
        </div>
        {% endfor %}
    </div>
</section>
