{% extends "base.html" %}
{% block title %}¿Olvidaste tu contraseña? — Padel Scouter{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8">
        <div class="text-center mb-8">
            <div class="text-4xl mb-3">🔐</div>
            <h2 class="text-2xl font-bold">¿Olvidaste tu contraseña?</h2>
            <p class="text-gray-400 text-sm mt-2">
                Introduce tu email y te enviaremos un enlace para restablecerla.
            </p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-gray-400 text-xs mb-1 block">Email</label>
                <input id="forgot-email" type="email" placeholder="tu@email.com"
                       class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3
                              text-white placeholder-gray-500 focus:border-emerald-500 focus:outline-none">
            </div>

            <button onclick="doForgotPassword()" id="btn-forgot"
                    class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg transition">
                Enviar enlace
            </button>

            <a href="/login" class="block text-center text-emerald-400 hover:text-emerald-300 text-sm mt-4">
                ← Volver al login
            </a>
        </div>

        <div id="forgot-success" class="hidden mt-4 text-emerald-400 text-sm text-center
                                         p-3 bg-emerald-900/20 rounded-lg"></div>
        <div id="forgot-error" class="hidden mt-4 text-red-400 text-sm text-center
                                       p-3 bg-red-900/20 rounded-lg"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function doForgotPassword() {
    const email = document.getElementById('forgot-email').value.trim().toLowerCase();
    if (!email) {
        document.getElementById('forgot-error').textContent = 'Introduce tu email';
        document.getElementById('forgot-error').classList.remove('hidden');
        return;
    }

    const btn = document.getElementById('btn-forgot');
    btn.textContent = 'Enviando...';
    btn.disabled = true;

    try {
        const res = await fetch(`/api/v1/auth/forgot-password?email=${encodeURIComponent(email)}`, {
            method: 'POST',
        });
        const data = await res.json();

        // OWASP A07 — siempre mostrar el mismo mensaje
        document.getElementById('forgot-success').textContent = data.message;
        document.getElementById('forgot-success').classList.remove('hidden');
        document.getElementById('forgot-error').classList.add('hidden');
    } catch {
        document.getElementById('forgot-error').textContent = 'Error al enviar. Inténtalo de nuevo.';
        document.getElementById('forgot-error').classList.remove('hidden');
    } finally {
        btn.textContent = 'Enviar enlace';
        btn.disabled = false;
    }
}
</script>
{% endblock %}
